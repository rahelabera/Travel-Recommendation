<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="./images/travel.png" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="./images/travel.png" alt="TravelBloom Logo" class="logo-img">
            <span class="navbar-title">TravelBloom</span>
        </div>
        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="#contact">Contact Us</a></li>
        </ul>
        <div></div>
    </nav>
    
    <section class="about-background">
        <section id="contact" class="contact-hero">
            <div class="social-icons">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div> 
            
            <div class="contact-info-box">
                <div class="contact-hero-content">
                    <h1>CONTACT US</h1>
                    <p>
                        Get in touch
                    </p>    
                    
                </div>
                <div>
                    <div class="contact-form">
                        <form action="submit_form.php" method="post">
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name">
                            <br/>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                            <br/>
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
                            <br/>
                            <button type="submit" class="submit-btn">Submit</button>
                        </form>
                    </div>
                </div>
                
            </div>
        </section>
    </section>
    <script src="./travel_recommendation.js"></script>

    
    
</body>
</html>
